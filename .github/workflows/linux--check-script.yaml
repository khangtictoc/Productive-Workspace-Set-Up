name: "[1.0] Verify Tools Installation"

on:
  workflow_dispatch:
    inputs:
      shell_type:
        description: "Choose Shell Type"
        required: false
        default: "bash"
        type: choice
        options:
          - bash
          - zsh
      branch:
        description: "Choose Shell Type"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - feat/macos-compat

jobs:
  verify-configuration:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Input
        run: |
          echo "Shell Type: ${{ github.event.inputs.shell_type }}"

  annacoda-install:
    runs-on: ubuntu-latest
    needs: verify-configuration
    steps:
      - name: Remove existing installation
        run: |
          # Only deactivate if conda is actually initialized
          [ -f "$HOME/anaconda3/etc/profile.d/conda.sh" ] && source "$HOME/anaconda3/etc/profile.d/conda.sh" && conda deactivate
          rm -rf "$HOME/anaconda3" "$HOME/miniconda3" /opt/conda
          sed -i '/conda/d' ~/.bashrc ~/.zshrc
      - name: Execute Installation
        run: |
          curl -sS --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 120  https://raw.githubusercontent.com/khangtictoc/Productive-Workspace-Set-Up/refs/heads/${{ github.event.inputs.branch }}/linux/installation/developer-packages/ubuntu/tools/annacoda.sh | bash

  ansi_color-install:
    runs-on: ubuntu-latest
    needs: verify-configuration
    steps:
      - name: Remove existing installation
        run: sudo rm -f /usr/local/bin/ansi
      - name: Execute Installation
        run: |
          curl -sS --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 120  https://raw.githubusercontent.com/khangtictoc/Productive-Workspace-Set-Up/refs/heads/${{ github.event.inputs.branch }}/linux/installation/developer-packages/ubuntu/tools/ansi_color.sh | bash

  ansible-install:
    runs-on: ubuntu-latest
    needs: verify-configuration
    steps:
      - name: Remove existing installation
        run: pip3 uninstall -y ansible ansible-core 2>/dev/null || true; sudo rm -f /usr/bin/ansible /usr/local/bin/ansible
      - name: Execute Installation
        run: |
          curl -sS --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 120  https://raw.githubusercontent.com/khangtictoc/Productive-Workspace-Set-Up/refs/heads/${{ github.event.inputs.branch }}/linux/installation/developer-packages/ubuntu/tools/ansible.sh | bash

  argocd_cli-install:
