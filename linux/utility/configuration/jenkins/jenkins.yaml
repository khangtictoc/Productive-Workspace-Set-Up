configuration-as-code: {}
credentials:
  folder: {}
  providerImpl: {}
  system:
    domainCredentials:
      - domain: {}
  user: {}
jenkins:
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  clouds:
    - kubernetes:
        containerCap: 10
        containerCapStr: "10"
        jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
        jenkinsUrl: "khangtictoc.jenkins.io"
        name: "kubernetes"
        namespace: "jenkins"
        podLabels:
          - key: "jenkins/jenkins-jenkins-agent"
            value: "true"
        serverUrl: "https://kubernetes.default"
        templates:
          - containers:
              - args: "^${computer.jnlpmac} ^${computer.name}"
                envVars:
                  - envVar:
                      key: "JENKINS_URL"
                      value: "khangtictoc.jenkins.io"
                image: "jenkins/inbound-agent:3355.v388858a_47b_33-5"
                name: "jnlp"
                resourceLimitCpu: "512m"
                resourceLimitMemory: "512Mi"
                resourceRequestCpu: "512m"
                resourceRequestMemory: "512Mi"
                workingDir: "/home/jenkins/agent"
            id: "e04379be04f395c9e02d839e147724fa7ee057420907f34ba5558c97b1691783"
            label: "jenkins-jenkins-agent"
            name: "default"
            namespace: "jenkins"
            nodeUsageMode: "NORMAL"
            podRetention: "never"
            serviceAccount: "default"
            slaveConnectTimeout: 100
            slaveConnectTimeoutStr: "100"
            yamlMergeStrategy: "override"
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: false
  disableRememberMe: false
  labelAtoms:
    - name: "General"
    - name: "built-in"
    - name: "jenkins-jenkins-agent"
  log: {}
  markupFormatter: "plainText"
  mode: NORMAL
  myViewsTabBar: "standard"
  nodeMonitors:
    - "architecture"
    - "clock"
    - diskSpace:
        freeSpaceThreshold: "1GiB"
        freeSpaceWarningThreshold: "2GiB"
    - "swapSpace"
    - tmpSpace:
        freeSpaceThreshold: "1GiB"
        freeSpaceWarningThreshold: "2GiB"
    - "responseTime"
  nodes:
    - permanent:
        launcher: "inbound"
        name: "General"
        remoteFS: "/home/jenkins/agent-general"
        retentionStrategy: "always"
  numExecutors: 0
  primaryView:
    all:
      name: "all"
  projectNamingStrategy: "standard"
  quietPeriod: 5
  remotingSecurity:
    enabled: true
  scmCheckoutRetryCount: 0
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
        - id: "admin"
          name: "Jenkins Admin"
          properties:
            - "apiToken"
            - "consoleUrlProvider"
            - "mailer"
            - "myView"
            - preferredProvider:
                providerId: "default"
            - "timezone"
            - "experimentalFlags"
  slaveAgentPort: 50000
  updateCenter:
    sites:
      - id: "default"
        url: "https://updates.jenkins.io/update-center.json"
  views:
    - list:
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"
        jobNames:
          - "NAB Internal/Backend Services/Build-Container-Go-Service"
          - "NAB Internal/Backend Services/Build-Container-Java-Service"
          - "NAB Internal/Backend Services/Build-Container-NodeJS-Service"
        name: "Backend CI"
        recurse: true
    - list:
        columns:
          - "status"
          - "weather"
          - "jobName"
          - "lastSuccess"
          - "lastFailure"
          - "lastDuration"
          - "buildButton"
        name: "Frontend CI"
    - all:
        name: "all"
  viewsTabBar: "standard"
